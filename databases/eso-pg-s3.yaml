# ESO: pull S3 creds from Vault -> create newapi-pg-s3 / bot-pg-s3 k8s Secrets.
# Replaces hand-applied secrets. On DR, ESO recreates these once Vault is up.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: http://openbao.openbao.svc:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: newapi-pg-s3
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: newapi-pg-s3
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: pg-s3
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bot-pg-s3
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: bot-pg-s3
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: pg-s3
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: newapi-pg-reader
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: newapi-pg-reader
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: newapi-pg-reader
---
# client CA (own CA + Teleport db-client CA bundle) for newapi-pg cert auth; pair lives in
# OpenBao (DR). cnpg.io/reload label makes the instance reload on change.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: newapi-pg-client-ca
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: newapi-pg-client-ca
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: ""
  dataFrom:
    - extract:
        key: newapi-pg-client-ca
