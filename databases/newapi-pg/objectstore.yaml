apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: newapi-pg-store
  namespace: databases
spec:
  # serverName is set via plugin parameters on the Cluster, NOT here (plugin API).
  configuration:
    destinationPath: s3://unorouter-pg-backups/
    endpointURL: https://fsn1.your-objectstorage.com
    s3Credentials:
      accessKeyId:
        name: newapi-pg-s3
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: newapi-pg-s3
        key: ACCESS_SECRET_KEY
      # Hetzner Ceph requires region or throws LocationConstraintConflict on writes.
      region:
        name: newapi-pg-s3
        key: REGION
    wal:
      compression: gzip
    data:
      compression: gzip
      # -vv: barman logs at WARNING by default = a healthy 15-min 1GB upload is SILENT and
      # indistinguishable from a hang. Debug logging shows per-part progress.
      additionalCommandArgs:
        - "-vv"
  # boto3 >=1.36 attaches x-amz-checksum headers Ceph/RadosGW rejects on MULTIPART uploads:
  # WAL (single-part) archives fine, the base backup (multipart) hangs forever. These env vars
  # revert to legacy checksum behavior. Runs in the barman plugin sidecar. (EDB/barman#1057)
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
