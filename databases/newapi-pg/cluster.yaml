apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: newapi-pg
  namespace: databases
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:15-standard-bookworm
  instances: 1 # bump to 3 at HA (multi-node)
  storage:
    size: 20Gi
    storageClass: local-path

  # --- FIRST BOOT: initdb (don is still the source of truth; data imported via pg_dump). ---
  # Matches don's db/user (newapi/newapi) so DSNs are unchanged. Re-import cycle = drop the
  # cluster + resync (fresh initdb) while don stays live as the safety net.
  bootstrap:
    initdb:
      database: newapi
      owner: newapi

  # --- DR MODE (post-cutover, when don is retired and CNPG's OWN S3 backups are the source).
  # Swap bootstrap.initdb above for bootstrap.recovery below, then bump the serverName lineage
  # (restore FROM current, archive TO next). Omit recoveryTarget => latest; add targetTime => PITR.
  # bootstrap:
  #   recovery:
  #     source: newapi-pg-origin
  # externalClusters:
  #   - name: newapi-pg-origin
  #     plugin:
  #       name: barman-cloud.cloudnative-pg.io
  #       parameters:
  #         barmanObjectName: newapi-pg-store
  #         serverName: newapi-pg-v1 # RESTORE-FROM lineage (current)

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: newapi-pg-store
        serverName: newapi-pg-v2 # ARCHIVE-TO lineage (current+1); MUST differ from restore-from

  # Teleport-provisioned read role. Declared here so CNPG reconciles it every DR.
  # The options_masked view + REVOKE/GRANT ride the physical backup (schema objects) -- no hook.
  managed:
    roles:
      - name: reader
        login: true
        # password from a Secret; Teleport maps the low-trust GitHub team -> this db-user.
        passwordSecret:
          name: newapi-pg-reader
        inRoles:
          - pg_read_all_data # broad read; the masking view + REVOKE on `options` still hides secrets

  postgresql:
    parameters:
      max_connections: "200"
