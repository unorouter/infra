apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: newapi-pg
  namespace: databases
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:15-standard-bookworm
  instances: 1 # bump to 3 at HA
  # barman-cloud-backup runs in the postgres container -> the boto3 checksum-disable env must
  # be HERE (not just instanceSidecarConfiguration). Fixes the Hetzner Ceph multipart hang.
  env:
    - name: AWS_REQUEST_CHECKSUM_CALCULATION
      value: when_required
    - name: AWS_RESPONSE_CHECKSUM_VALIDATION
      value: when_required
  storage:
    size: 20Gi
    storageClass: local-path

  # --- DR MODE: recovery is create-time-only (inert on a running cluster). On every fresh
  # cluster create this RESTORES from S3 (latest; add recoveryTarget.targetTime for PITR).
  # On each DR event bump the lineage PAIR: restore-from = last archive, archive-to = +1.
  # (initdb era over: CNPG's own S3 backups are the source of truth now.)
  bootstrap:
    recovery:
      source: newapi-pg-origin
  externalClusters:
    - name: newapi-pg-origin
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: newapi-pg-store
          serverName: newapi-pg-v3 # RESTORE-FROM lineage (current archive)

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: newapi-pg-store
        serverName: newapi-pg-v4 # ARCHIVE-TO lineage (current+1); MUST differ from restore-from

  # Teleport-provisioned read role. Declared here so CNPG reconciles it every DR.
  # masking = RLS policy on options (masking.sql); re-apply after fresh don imports.
  managed:
    roles:
      - name: reader
        login: true
        # password from a Secret; Teleport maps the low-trust GitHub team -> this db-user.
        # pg_read_all_data = browse all tables (users/channels/etc). Secret option VALUES are
        # hidden by an RLS policy on `options` (masking.sql) which pg_read_all_data does NOT
        # bypass. reader must NEVER get BYPASSRLS (that WOULD defeat it). Verified on real data.
        passwordSecret:
          name: newapi-pg-reader
        inRoles:
          - pg_read_all_data

  # Teleport DB access: reader authenticates with a Teleport-signed client cert (CN=reader).
  # clientCASecret ca.crt = own 10y CA (first, holds ca.key -> operator signs streaming_replica
  # from it) + Teleport db-client CA appended. Server certs stay operator-managed.
  certificates:
    clientCASecret: newapi-pg-client-ca

  postgresql:
    # cert rule lands AFTER CNPG's fixed streaming_replica rules, BEFORE the scram catch-all
    pg_hba:
      - hostssl newapi reader all cert
    parameters:
      max_connections: "200"
      # 3.3GB model_status_pings + 2.3M logs: default 128MB shared_buffers thrashed disk
      # on every status-page aggregation (83 SLOW SQL / 2h, user-visible page hangs)
      shared_buffers: "512MB"
      work_mem: "12MB"
      effective_cache_size: "3GB"
