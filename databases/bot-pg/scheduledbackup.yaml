apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: bot-pg-daily
  namespace: databases
spec:
  schedule: "0 15 3 * * *" # 03:15 UTC daily (offset from newapi-pg)
  backupOwnerReference: self
  cluster:
    name: bot-pg
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
