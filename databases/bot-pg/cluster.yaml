apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: bot-pg
  namespace: databases
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18-standard-bookworm
  instances: 1 # bump to 3 at HA
  storage:
    size: 10Gi
    storageClass: local-path

  # FIRST BOOT: initdb (don is source of truth; data imported via pg_dump). Matches don's
  # db/user so DSNs are unchanged. DR mode (recovery from S3) = post-cutover, see newapi-pg.
  bootstrap:
    initdb:
      database: unorouter-bot-db
      owner: unorouter

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: bot-pg-store
        serverName: bot-pg-v3 # ARCHIVE-TO (current+1); MUST differ
