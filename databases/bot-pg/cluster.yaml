apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: bot-pg
  namespace: databases
spec:
  env:
    - name: AWS_REQUEST_CHECKSUM_CALCULATION
      value: when_required
    - name: AWS_RESPONSE_CHECKSUM_VALIDATION
      value: when_required
  imageName: ghcr.io/cloudnative-pg/postgresql:18-standard-bookworm
  instances: 1 # bump to 3 at HA
  storage:
    size: 10Gi
    storageClass: local-path

  # DR MODE: create-time-only recovery from S3 (see newapi-pg for the lineage mechanics).
  bootstrap:
    recovery:
      source: bot-pg-origin
  externalClusters:
    - name: bot-pg-origin
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: bot-pg-store
          serverName: bot-pg-v3 # RESTORE-FROM (current archive)

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: bot-pg-store
        serverName: bot-pg-v4 # ARCHIVE-TO (current+1); MUST differ from restore-from
