apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: bot-pg-store
  namespace: databases
spec:
  configuration:
    destinationPath: s3://unorouter-pg-backups/
    endpointURL: https://fsn1.your-objectstorage.com
    s3Credentials:
      accessKeyId:
        name: bot-pg-s3
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: bot-pg-s3
        key: ACCESS_SECRET_KEY
      region:
        name: bot-pg-s3
        key: REGION
    wal:
      compression: gzip
    data:
      compression: gzip
  # boto3 >=1.36 checksum headers hang Ceph multipart uploads (see newapi-pg-store). bot is
  # small so it slipped through single-part, but set it here too for consistency + growth.
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
