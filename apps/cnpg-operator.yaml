apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # operator before any Cluster CRs
spec:
  project: default
  source:
    repoURL: https://github.com/unorouter/infra.git
    targetRevision: main
    path: infra/cnpg-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # CNPG CRDs are large (annotation-size limit)
