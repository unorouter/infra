apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # secrets keystone; before app workloads
spec:
  project: default
  sources:
    # official HashiCorp Helm chart + our values.yaml from the repo
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: 0.34.0
      helm:
        valueFiles:
          - $values/infra/vault/values.yaml
    - repoURL: https://github.com/unorouter/infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
