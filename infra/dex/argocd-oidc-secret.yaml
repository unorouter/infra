# argocd oidc.config references this as $argocd-dex-sso:argocdClientSecret -- argocd only
# reads $-ref secrets labeled part-of=argocd in its own namespace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-dex-sso
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-dex-sso
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: argocdClientSecret
      remoteRef: { key: dex-sso, property: argocdClientSecret }
