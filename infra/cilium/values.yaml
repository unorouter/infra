# Cilium owns CNI + kube-proxy replacement. Public ingress is the cloudflared tunnel
# (outbound-only) and teleport's svc externalIPs (eBPF) -- no Envoy edge, no Gateway API,
# no host :80/:443 listeners.
kubeProxyReplacement: true

# valid ONLY while every node is a k3s server (apiserver on each host); adding an agent
# node requires pointing this at a real apiserver address first
k8sServiceHost: 127.0.0.1
k8sServicePort: 6443

ipam:
  operator:
    # k3s default podCIDR
    clusterPoolIPv4PodCIDRList:
      - 10.42.0.0/16

# no L7 policies / no Gateway -> the dedicated Envoy DaemonSet is idle weight
envoy:
  enabled: false

hubble:
  # relay kept for cluster-wide `hubble observe` (CLI). UI removed 2026-07-23: rarely opened,
  # flows are reachable via `kubectl -n kube-system exec ds/cilium -c cilium-agent -- hubble observe`.
  relay:
    enabled: true
  ui:
    enabled: false

operator:
  replicas: 1

# NOTE: these values are ALSO inlined in tofu/cloud-init.yaml.tftpl (the k3s auto-deploy
# HelmChart) because bootstrap can't reference git before ArgoCD exists. Keep the two in
# sync on any Cilium values change. Live changes go through node1's
# /var/lib/rancher/k3s/server/manifests/cilium.yaml (k3s helm-controller reconciles it);
# this file is documentation + `make bootstrap` fallback.
