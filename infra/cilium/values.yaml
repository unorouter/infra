# Cilium owns CNI + kube-proxy + public L7 (Gateway API hostNetwork). No Traefik, no servicelb.
kubeProxyReplacement: true

# single-node: API on localhost; multi-node later -> server's tailscale IP
k8sServiceHost: 127.0.0.1
k8sServicePort: 6443

ipam:
  operator:
    # matches k3s default podCIDR + the tailscale ACL autoApprover route
    clusterPoolIPv4PodCIDRList:
      - 10.42.0.0/16

gatewayAPI:
  enabled: true
  # single cloud node, no LB controller: Envoy binds :80/:443 on the host directly.
  # nodeIPAM+Gateway drops external traffic on single-node k3s (cilium#44187) - do not use.
  hostNetwork:
    enabled: true

envoy:
  securityContext:
    capabilities:
      # datapath caps (NET_ADMIN + SYS_ADMIN) are MANDATORY or envoy crashes; keep the
      # chart defaults and ADD NET_BIND_SERVICE for hostNetwork listeners on ports <=1023.
      envoy:
        - NET_ADMIN
        - SYS_ADMIN
        - NET_BIND_SERVICE
      # pass NET_BIND_SERVICE through to the actual Envoy process (sibling of `envoy`, not nested)
      keepCapNetBindService: true

hubble:
  relay:
    enabled: true
  ui:
    enabled: true


operator:
  replicas: 1
