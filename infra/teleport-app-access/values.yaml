# teleport-kube-agent -- App + DB + Kube access. Enrolls the internal web UIs, the newapi-pg
# DB, AND the cluster itself for kubectl (tsh kube login) behind Teleport SSO. Reaches the
# proxy at its public ACME address (multiplex/ALPN). Joins with the static app token from
# OpenBao (via ESO secret teleport-app-join, key auth-token).
roles: app,db,kube
proxyAddr: teleport.unorouter.com:443
# registers THIS cluster as a Teleport kube_cluster; `tsh kube login unorouter` targets it.
# The agent's ServiceAccount reaches the in-cluster kube API; the chart binds it cluster-admin
# so the user's kubernetes_groups (system:masters, from the kube-admin role) are honored via
# impersonation. Requires the join token to also permit `kube` (auth_service tokens = app,db,kube).
kubeClusterName: unorouter
# join token comes from an EXTERNAL secret (ESO -> OpenBao); chart reads key `auth-token`.
joinTokenSecret:
  create: false
  name: teleport-kube-agent-join-token

# DB access: tsh db connect newapi-pg --db-user=reader (RLS-masked role). Teleport signs a
# per-session client cert (CN=reader); postgres trusts it via the client-CA bundle on the
# cluster. verify-full against CNPG's server CA (synced from databases ns by ESO).
databases:
  - name: newapi-pg
    uri: newapi-pg-rw.databases.svc.cluster.local:5432
    protocol: postgres
    static_labels:
      env: prod
    tls:
      mode: verify-full
      ca_cert_file: /etc/teleport-tls-db/newapi-pg/ca.crt

extraVolumes:
  - name: newapi-pg-server-ca
    secret:
      secretName: newapi-pg-server-ca
      items: [{ key: ca.crt, path: ca.crt }]
extraVolumeMounts:
  - name: newapi-pg-server-ca
    mountPath: /etc/teleport-tls-db/newapi-pg
    readOnly: true

# routing is by Host header: browser hits <public_addr>, proxy matches it to the app, forwards
# to uri. TLS terminates at Cloudflare's edge; the cloudflared->proxy hop rides the WebSocket
# upgrade so the proxy needs NO per-app/wildcard cert (only its own teleport.unorouter.com cert).
apps:
  - name: argocd
    uri: https://argo-cd-argocd-server.argocd.svc.cluster.local:443  # https to stop the 80->443 self-redirect loop
    public_addr: argocd.unorouter.com
    insecure_skip_verify: true   # argocd-server self-signed TLS
    labels: { env: internal }
    rewrite:
      redirect:
        - argo-cd-argocd-server.argocd.svc.cluster.local
  - name: hubble
    uri: http://hubble-ui.kube-system.svc.cluster.local:80
    public_addr: hubble.unorouter.com
    labels: { env: internal }
  - name: openbao
    uri: http://openbao.openbao.svc.cluster.local:8200   # tls_disable in this deploy
    public_addr: openbao.unorouter.com
    labels: { env: internal }
    rewrite:
      redirect:
        - openbao.openbao.svc.cluster.local

# single node, no HA yet
highAvailability:
  replicaCount: 1
