# Join token (single source: OpenBao secret/teleport-app-join). ESO syncs it to BOTH the auth
# pod's namespace (mounted as the token file) and the agent's namespace (its authToken).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teleport-app-join
  namespace: teleport
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: teleport-app-join
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef: { key: teleport-app-join, property: token }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teleport-app-join
  namespace: teleport-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: teleport-app-join
    creationPolicy: Owner
  data:
    - secretKey: auth-token
      remoteRef: { key: teleport-app-join, property: token }
