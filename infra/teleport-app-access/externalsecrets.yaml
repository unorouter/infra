# Join token (single source: OpenBao secret/teleport-app-join). ESO syncs it to BOTH the auth
# pod's namespace (mounted as the token file) and the agent's namespace (its authToken).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teleport-app-join
  namespace: teleport
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: teleport-app-join
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef: { key: teleport-app-join, property: token }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teleport-app-join
  namespace: teleport-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: teleport-kube-agent-join-token   # fixed name the chart mounts as auth-token
    creationPolicy: Owner
  data:
    - secretKey: auth-token
      remoteRef: { key: teleport-app-join, property: token }
---
# --- CNPG server CA -> agent ns (for verify-full to newapi-pg). ESO kubernetes provider
# mirrors databases/newapi-pg-ca; tracks CNPG's 90-day CA rotation automatically.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-db-ca-reader
  namespace: teleport-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-newapi-pg-ca
  namespace: databases
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [newapi-pg-ca]
    verbs: [get, list, watch]
  - apiGroups: [authorization.k8s.io]
    resources: [selfsubjectrulesreviews]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-db-ca-reader
  namespace: databases
subjects:
  - kind: ServiceAccount
    name: eso-db-ca-reader
    namespace: teleport-agent
roleRef:
  kind: Role
  name: read-newapi-pg-ca
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: k8s-databases
  namespace: teleport-agent
spec:
  provider:
    kubernetes:
      remoteNamespace: databases
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-db-ca-reader
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: newapi-pg-server-ca
  namespace: teleport-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: k8s-databases
    kind: SecretStore
  target:
    name: newapi-pg-server-ca
    creationPolicy: Owner
  data:
    - secretKey: ca.crt
      remoteRef: { key: newapi-pg-ca, property: ca.crt }
---
# S3 creds for teleport auth (session recordings -> s3://unorouter-pg-backups/teleport-recordings).
# Was missing entirely: audit_sessions_uri was configured but the auth pod had no AWS env.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teleport-s3
  namespace: teleport
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: teleport-s3
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: pg-s3, property: ACCESS_KEY_ID }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: pg-s3, property: ACCESS_SECRET_KEY }
