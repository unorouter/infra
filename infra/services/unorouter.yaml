# unorouter (Next.js BFF). NEXT_PUBLIC_* baked at build; server env at runtime wins over the
# image's .env (dotenv semantics). PRIVATE image (build bakes secrets) -> ghcr-pull.
apiVersion: v1
kind: Service
metadata:
  name: unorouter
  namespace: services
spec:
  selector: { app: unorouter }
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unorouter
  namespace: services
spec:
  replicas: 2
  strategy:
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app: unorouter }
  template:
    metadata:
      labels: { app: unorouter }
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: { app: unorouter }
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: unorouter
          image: ghcr.io/unorouter/unorouter:latest
          resources:
            requests: { memory: 512Mi, cpu: 200m }
          envFrom:
            - secretRef: { name: unorouter-env }
          ports:
            - containerPort: 3000
          # readiness gates traffic on deps (db/upstream); generous timeout, deps can be slow
          readinessProbe:
            httpGet: { path: /api/ops/health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          # liveness must be process-local ONLY: killing the pod cannot fix a slow external
          # dep, it just crashloops the whole frontend (2026-07-23 incident)
          livenessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 20
---
# mcp: stateless npx package, no secrets
apiVersion: v1
kind: Service
metadata:
  name: unorouter-mcp
  namespace: services
spec:
  selector: { app: unorouter-mcp }
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unorouter-mcp
  namespace: services
spec:
  replicas: 1
  selector:
    matchLabels: { app: unorouter-mcp }
  template:
    metadata:
      labels: { app: unorouter-mcp }
    spec:
      containers:
        - name: mcp
          image: node:22-alpine
          command: [npx, -y, --package=unorouter-mcp@0.2.1, unorouter-mcp-http]
          env:
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 10
