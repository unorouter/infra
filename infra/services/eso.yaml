# Runtime env for the revenue services, sourced from OpenBao (imported from don's live
# containers; SQL_DSN/REDIS/POSTGRES_* re-pointed at CNPG/redis ClusterIP, DEBUG=false).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: newapi-env
  namespace: services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: newapi-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: newapi-env
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unorouter-env
  namespace: services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: unorouter-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: unorouter-env
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bot-env
  namespace: services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: bot-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: bot-env
---
# ghcr pull secret for the PRIVATE unorouter image (its build bakes server secrets).
# OpenBao key ghcr-pull.dockerconfigjson = full .dockerconfigjson value (PAT read:packages).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef: { key: ghcr-pull, property: dockerconfigjson }
