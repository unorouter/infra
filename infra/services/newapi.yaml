# new-api gateway: master (1, runs migrations + scheduled jobs) + slaves (2, serve traffic).
# Both share one `app: new-api` Service (master also serves, like don's Traefik WRR).
# /data + /logs = per-pod emptyDir (verified on don: pprof dumps + rotated logs only).
apiVersion: v1
kind: Service
metadata:
  name: new-api
  namespace: services
spec:
  selector: { app: new-api }
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api-master
  namespace: services
spec:
  replicas: 0 # REPLICATION PHASE: parked while don streams into CNPG (cutover scales to 1)
  selector:
    matchLabels: { app: new-api, tier: master }
  template:
    metadata:
      labels: { app: new-api, tier: master }
    spec:
      containers:
        - name: new-api
          image: ghcr.io/unorouter/new-api:latest
          envFrom:
            - secretRef: { name: newapi-env }
          # NODE_TYPE empty in the env secret => master
          ports:
            - containerPort: 3000
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: logs, mountPath: /logs }
          # startupProbe gates liveness: DB migration on 2.3M rows can take minutes on first
          # boot; without this, liveness restarts the pod mid-migration (crashloop).
          startupProbe:
            httpGet: { path: /api/status, port: 3000 }
            periodSeconds: 10
            failureThreshold: 60   # up to 10min for migration
          readinessProbe:
            httpGet: { path: /api/status, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/status, port: 3000 }
            periodSeconds: 20
      volumes:
        # per-pod scratch: /data holds only pprof dumps, /logs rotated logfiles -- nothing
        # shared, nothing worth surviving a pod. Kills the multi-node RWX debt entirely.
        - name: data
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api-slave
  namespace: services
spec:
  replicas: 0 # REPLICATION PHASE: parked (cutover scales to 2)
  selector:
    matchLabels: { app: new-api, tier: slave }
  template:
    metadata:
      labels: { app: new-api, tier: slave }
    spec:
      containers:
        - name: new-api
          image: ghcr.io/unorouter/new-api:latest
          envFrom:
            - secretRef: { name: newapi-env }
          env:
            - name: NODE_TYPE
              value: slave
          ports:
            - containerPort: 3000
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: logs, mountPath: /logs }
          readinessProbe:
            httpGet: { path: /api/status, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/status, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        # per-pod scratch: /data holds only pprof dumps, /logs rotated logfiles -- nothing
        # shared, nothing worth surviving a pod. Kills the multi-node RWX debt entirely.
        - name: data
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: newapi-redis
  namespace: services
spec:
  selector: { app: newapi-redis }
  ports:
    - port: 6379
      targetPort: 6379
---
# cache only (sessions/rate-limit): ephemeral, no persistence to migrate
apiVersion: apps/v1
kind: Deployment
metadata:
  name: newapi-redis
  namespace: services
spec:
  replicas: 1
  selector:
    matchLabels: { app: newapi-redis }
  template:
    metadata:
      labels: { app: newapi-redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket: { port: 6379 }
