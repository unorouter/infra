# Discord bot: SINGLE gateway connection -- never more than 1 replica (duplicate event
# handling otherwise). Recreate strategy keeps that true during rollouts.
apiVersion: v1
kind: Service
metadata:
  name: unorouter-bot
  namespace: services
spec:
  selector: { app: unorouter-bot }
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unorouter-bot
  namespace: services
spec:
  replicas: 1 # single Discord gateway (don bot stopped at cutover)
  strategy:
    type: Recreate # never two gateways during a roll
  selector:
    matchLabels: { app: unorouter-bot }
  template:
    metadata:
      labels: { app: unorouter-bot }
    spec:
      containers:
        - name: bot
          image: ghcr.io/unorouter/unorouter-bot:latest
          resources:
            requests: { memory: 128Mi, cpu: 50m }
          envFrom:
            - secretRef: { name: bot-env }
          ports:
            - containerPort: 4000
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 30
            periodSeconds: 20
