# Cloudflare Tunnel (cloudflared) - outbound-only edge entry. Hides node IP, no inbound ports.
# Routes internal UIs (gated by CF Access GitHub SSO) + prod apps later (-> Cilium Gateway).
# Token from OpenBao via ESO. Teleport stays DIRECT grey-cloud (ALPN, can't tunnel).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudflared
  namespace: cloudflared
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-token
  namespace: cloudflared
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflared-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef: { key: cloudflared, property: token }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    # tunnel run reads token from env; ingress rules here (locally-managed config)
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    # Internal UIs now front through Teleport App Access (GitHub SSO), NOT CF Access.
    # All *-tp hosts point at the SAME proxy origin; Teleport routes by Host header to the app
    # whose public_addr matches. noTLSVerify: proxy serves its own teleport.unorouter.com cert
    # on this in-cluster hop (edge TLS already terminated at Cloudflare). Do NOT set
    # httpHostHeader -- the original Host is what selects the app.
    ingress:
      - hostname: argocd-tp.unorouter.com
        service: https://teleport.teleport.svc.cluster.local:443
        originRequest: { originServerName: teleport.unorouter.com, noTLSVerify: true }
      - hostname: hubble-tp.unorouter.com
        service: https://teleport.teleport.svc.cluster.local:443
        originRequest: { originServerName: teleport.unorouter.com, noTLSVerify: true }
      - hostname: openbao-tp.unorouter.com
        service: https://teleport.teleport.svc.cluster.local:443
        originRequest: { originServerName: teleport.unorouter.com, noTLSVerify: true }
      # Dex OIDC IdP: direct (no Teleport gate) -- discovery/JWKS must be publicly fetchable
      # and browser redirects land here; actual auth happens at GitHub (org-gated).
      - hostname: dex.unorouter.com
        service: http://dex.dex.svc.cluster.local:5556
      # PostHog EU ingest proxy (was a don traefik route; NEXT_PUBLIC_POSTHOG_HOST is
      # build-baked to ph.unorouter.com so the host must keep working). Assets rule first.
      - hostname: ph.unorouter.com
        path: ^/static/.*
        service: https://eu-assets.i.posthog.com
        originRequest: { httpHostHeader: eu-assets.i.posthog.com, originServerName: eu-assets.i.posthog.com }
      - hostname: ph.unorouter.com
        service: https://eu.i.posthog.com
        originRequest: { httpHostHeader: eu.i.posthog.com, originServerName: eu.i.posthog.com }
      # ---- prod services (real hostnames since cutover; *-k3s shadows kept for testing) ----
      - hostname: api.unorouter.com
        service: http://new-api.services.svc.cluster.local:3000
      - hostname: unorouter.com
        service: http://unorouter.services.svc.cluster.local:3000
      - hostname: www.unorouter.com
        service: http://unorouter.services.svc.cluster.local:3000
      - hostname: status.unorouter.com
        service: http://unorouter.services.svc.cluster.local:3000
      - hostname: mcp.unorouter.com
        service: http://unorouter-mcp.services.svc.cluster.local:3000
      - hostname: bot.unorouter.com
        service: http://unorouter-bot.services.svc.cluster.local:4000
      - hostname: uno-k3s.unorouter.com
        service: http://unorouter.services.svc.cluster.local:3000
      - hostname: api-k3s.unorouter.com
        service: http://new-api.services.svc.cluster.local:3000
      - hostname: mcp-k3s.unorouter.com
        service: http://unorouter-mcp.services.svc.cluster.local:3000
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 2  # HA only; do NOT autoscale (downscale breaks connections)
  selector:
    matchLabels: { app: cloudflared }
  template:
    metadata:
      labels: { app: cloudflared }
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: { app: cloudflared }
                topologyKey: kubernetes.io/hostname
      serviceAccountName: cloudflared
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.7.0
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom: { secretKeyRef: { name: cloudflared-token, key: token } }
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared
              readOnly: true
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap: { name: cloudflared-config }
---
# SSO: internal UIs are gated by TELEPORT App Access (GitHub connector), not CF Access.
# - hosts argocd-tp / hubble-tp / openbao-tp .unorouter.com -> tunnel -> teleport proxy -> app.
# - Teleport GitHub SSO (org unorouter, team admins) is the gate; one pane like the work setup.
# - CF Access apps + the "Cloudflare Access SSO" GitHub OAuth app on these hosts are RETIRED
#   (removed via CF API). Cloudflare here is only the tunnel (IP hiding), not the auth layer.
# - the flat *-tp naming keeps CF free Universal SSL (*.unorouter.com) valid at the edge (no ACM).
