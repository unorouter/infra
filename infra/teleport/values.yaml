# teleport-cluster Helm chart (CE, self-hosted). Access plane: kubectl + Postgres behind
# GitHub SSO, short-lived certs, session recording + audit.
#
# DR posture: re-login acceptable at 1-2 users -> standalone SQLite on a PVC. On full node
# loss the PVC dies -> fresh CA -> everyone `tsh login` again. Session recordings survive in
# S3. Avoids the Teleport-needs-Postgres-while-Postgres-restores cycle.
chartMode: standalone
clusterName: teleport.unorouter.com

# ACME (Let's Encrypt): Teleport auto-gets + renews a cert. Needs teleport.unorouter.com DNS
# -> node IP (grey-cloud, NOT behind CF proxy) + port 443 reachable.
acme: true
acmeEmail: diabolic1996@gmail.com

# grey-cloud + own hostNetwork port: ALPN multiplex needs raw TLS passthrough (NOT CF proxy,
# NOT Cilium Gateway). hostNetwork binds the proxy on the node's public IP directly.
proxyListenerMode: multiplex

persistence:
  enabled: true
  volumeSize: 5Gi
  storageClassName: local-path

# session recordings -> S3 (node-independent, survives node loss). Audit events stay on SQLite.
# static app-join token (file-based) lets the in-cluster teleport-kube-agent (App Access) join
# without a short-lived tctl step -- reproducible on every DR. Secret value from OpenBao via ESO,
# mounted into the auth pod; same value reaches the agent as its authToken (single source).
auth:
  teleportConfig:
    teleport:
      storage:
        audit_sessions_uri: "s3://unorouter-pg-backups/teleport-recordings?endpoint=fsn1.your-objectstorage.com&region=fsn1"
    auth_service:
      tokens:
        - "app,db:/etc/teleport-join/token"
  extraVolumes:
    - name: app-join-token
      secret:
        secretName: teleport-app-join
  extraVolumeMounts:
    - name: app-join-token
      mountPath: /etc/teleport-join
      readOnly: true

# expose the proxy on the host network (needs the public IP for ACME + ALPN passthrough)
service:
  type: ClusterIP
  spec:
    externalIPs:
      - "46.224.153.131"   # single bare node: route node-public-IP:443 to the proxy (no cloud LB)
proxy:
  # hostNetwork so :443 binds the node public IP directly (grey-cloud DNS points here)
  annotations: {}

# GitHub SSO connector + roles are applied as Teleport resources (tctl / operator) after
# install -- Client Secret is not committed; it goes into a k8s Secret via SOPS/ESO.
# Client ID (not secret): Ov23li6rNPrZg3tJr1v5
