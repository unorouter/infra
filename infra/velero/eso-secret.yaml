# ESO -> Velero's S3 credentials (aws-cli ini format) from OpenBao pg-s3.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-s3
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-s3
    creationPolicy: Owner
    template:
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .ACCESS_KEY_ID }}
          aws_secret_access_key={{ .ACCESS_SECRET_KEY }}
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef: { key: pg-s3, property: ACCESS_KEY_ID }
    - secretKey: ACCESS_SECRET_KEY
      remoteRef: { key: pg-s3, property: ACCESS_SECRET_KEY }
